services:
  npm:
    image: jc21/nginx-proxy-manager:latest
    container_name: npm
    hostname: npm
    healthcheck:
      test: curl -Lk -fsS http://localhost:80 || exit 1
    ports:
      - 80:80
      - 443:443
      - 81:81
    environment:
      - TZ=${TZ}
      - DISABLE_IPV6=true
    volumes:
      - /opt/docker/npm/data:/data
      - /opt/docker/npm/letsencrypt:/etc/letsencrypt
    restart: unless-stopped
    networks:
      - red-criticos

networks:
  red-criticos:
    external: true