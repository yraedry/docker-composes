services:
  radarr:
    image: linuxserver/radarr:6.0.4
    container_name: radarr
    hostname: radarr
    healthcheck:
      test: curl -Lk -fsS http://localhost:7878 || exit 1
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ}
      - UMASK=${UMASK:-022}
    volumes:
      - ./config:/config/:rw
      - ${UNRAID_MOUNT}:/multimedia/:rw
    ports:
      - 7878:7878/tcp
    restart: unless-stopped
    networks:
      - red-arr

networks:
  red-arr:
    external: true

