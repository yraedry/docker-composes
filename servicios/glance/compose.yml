services:
  glance:
    image: glanceapp/glance:latest
    container_name: glance
    hostname: glance
    healthcheck:
      test: curl -Lk -fsS http://localhost:8082 || exit 1
    restart: always
    ports:
      - "8082:8080"
    volumes:
      - ./glance.yml:/app/config/glance.yml
    networks:
      - red-servicios

networks:
  red-servicios:
    external: true
