services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres-servicios
    hostname: postgres-servicios
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - ./data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - red-servicios

networks:
  red-servicios:
    external: true
